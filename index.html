<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeki Chat - Smart Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #0a0a0f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }

        .container {
            background: #14141c;
            border-radius: 24px;
            max-width: 950px;
            width: 100%;
            height: 94vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.04);
            overflow: hidden;
        }

        .header {
            background: rgba(20, 20, 28, 0.95);
            backdrop-filter: blur(20px);
            padding: 14px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            font-size: 28px;
            filter: drop-shadow(0 0 10px rgba(79, 172, 254, 0.3));
        }

        .header-title {
            color: #fff;
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-status {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #6e6f82;
            font-size: 12px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #10a37f;
            border-radius: 50%;
            display: inline-block;
            animation: pulse-dot 2s infinite;
            box-shadow: 0 0 12px rgba(16, 163, 127, 0.4);
        }

        @keyframes pulse-dot {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.4;
                transform: scale(0.8);
            }
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            background: #0f0f17;
            scroll-behavior: smooth;
        }

        .chat-area::-webkit-scrollbar {
            width: 4px;
        }

        .chat-area::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-area::-webkit-scrollbar-thumb {
            background: #2a2a3a;
            border-radius: 10px;
        }

        .message {
            display: flex;
            gap: 14px;
            padding: 14px 0;
            animation: fadeSlide 0.25s ease;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-avatar {
            width: 34px;
            height: 34px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .message-avatar.user {
            background: linear-gradient(135deg, #10a37f, #0d8a6a);
        }

        .message-avatar.bot {
            background: linear-gradient(135deg, #4facfe, #3b82f6);
            box-shadow: 0 0 20px rgba(79, 172, 254, 0.2);
        }

        .message-content {
            flex: 1;
            color: #e5e7eb;
            font-size: 15px;
            line-height: 1.7;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .welcome-msg {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            min-height: 280px;
            color: #6e6f82;
            text-align: center;
            padding: 40px 20px;
        }

        .welcome-msg .big-icon {
            font-size: 56px;
            margin-bottom: 14px;
        }

        .welcome-msg h2 {
            color: #e5e7eb;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .welcome-msg p {
            font-size: 14px;
            max-width: 400px;
            color: #6e6f82;
        }

        .typing-indicator {
            display: none;
            padding: 12px 0;
            gap: 14px;
            align-items: center;
            margin: 0 24px;
        }

        .typing-indicator.active {
            display: flex;
        }

        .typing-indicator .avatar {
            width: 34px;
            height: 34px;
            border-radius: 10px;
            background: linear-gradient(135deg, #4facfe, #3b82f6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .typing-dots {
            display: flex;
            gap: 5px;
            padding: 6px 0;
        }

        .typing-dots span {
            width: 7px;
            height: 7px;
            background: #4a4a5a;
            border-radius: 50%;
            animation: typingBounce 1.3s infinite both;
        }

        .typing-dots span:nth-child(1) {
            animation-delay: 0s;
        }
        .typing-dots span:nth-child(2) {
            animation-delay: 0.2s;
        }
        .typing-dots span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typingBounce {
            0%,
            60%,
            100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-8px);
            }
        }

        .input-area {
            background: rgba(15, 15, 23, 0.95);
            backdrop-filter: blur(20px);
            padding: 14px 24px 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            flex-shrink: 0;
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 14px;
            padding: 6px 8px 6px 16px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.25s ease;
        }

        .input-wrapper:focus-within {
            border-color: rgba(79, 172, 254, 0.3);
            box-shadow: 0 0 30px rgba(79, 172, 254, 0.05);
        }

        #userInput {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #e5e7eb;
            font-size: 15px;
            padding: 10px 4px;
            resize: none;
            min-height: 24px;
            max-height: 160px;
        }

        #userInput::placeholder {
            color: #4a4a5a;
        }

        .btn-group {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .btn-icon {
            background: transparent;
            border: none;
            color: #4a4a5a;
            font-size: 18px;
            cursor: pointer;
            padding: 8px 10px;
            border-radius: 10px;
            transition: all 0.2s;
        }

        .btn-icon:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.06);
            color: #e5e7eb;
        }

        .btn-icon:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .btn-send {
            background: linear-gradient(135deg, #4facfe, #3b82f6);
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 10px 22px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 4px 20px rgba(79, 172, 254, 0.2);
        }

        .btn-send:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(79, 172, 254, 0.3);
        }

        .btn-send:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        .lang-selector {
            display: flex;
            gap: 4px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 8px;
            padding: 2px;
            margin-top: 10px;
            align-self: flex-start;
        }

        .lang-btn {
            background: transparent;
            border: none;
            color: #4a4a5a;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .lang-btn.active {
            background: rgba(79, 172, 254, 0.15);
            color: #4facfe;
        }

        .lang-btn:hover:not(.active) {
            color: #8e8ea0;
        }

        @media (max-width: 640px) {
            body {
                padding: 0;
            }
            .container {
                height: 100vh;
                border-radius: 0;
            }
            .header {
                padding: 12px 16px;
            }
            .header-title {
                font-size: 17px;
            }
            .chat-area {
                padding: 12px 16px;
            }
            .message {
                gap: 10px;
                padding: 10px 0;
            }
            .message-avatar {
                width: 30px;
                height: 30px;
                font-size: 14px;
            }
            .message-content {
                font-size: 14px;
            }
            .input-area {
                padding: 10px 16px 14px;
            }
            .input-wrapper {
                padding: 4px 6px 4px 12px;
            }
            #userInput {
                font-size: 14px;
                padding: 8px 2px;
            }
            .btn-send {
                padding: 8px 16px;
                font-size: 13px;
            }
            .welcome-msg .big-icon {
                font-size: 40px;
            }
            .welcome-msg h2 {
                font-size: 20px;
            }
            .typing-indicator {
                margin: 0 16px;
            }
        }

        @media (max-width: 400px) {
            .btn-send span:first-child {
                display: none;
            }
            .header-status span:last-child {
                display: none;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <div class="header">
            <div class="header-left">
                <span class="logo-icon">🧠</span>
                <span class="header-title">Zeki Chat</span>
            </div>
            <div class="header-status">
                <span class="status-dot"></span>
                <span>Ready</span>
            </div>
        </div>

        <div class="chat-area" id="chatArea">
            <div class="welcome-msg" id="welcomeMsg">
                <span class="big-icon">👋</span>
                <h2>Welcome to Zeki Chat</h2>
                <p>Ask me anything and I'll answer in Arabic 🚀</p>
            </div>
        </div>

        <div class="typing-indicator" id="typingIndicator">
            <div class="avatar">🧠</div>
            <div class="typing-dots">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="userInput" placeholder="Type your message..." />
                <div class="btn-group">
                    <button class="btn-icon" id="clearBtn" title="Clear chat">
                        🗑️
                    </button>
                    <button class="btn-send" id="sendBtn">
                        <span>Send</span>
                        <span>➤</span>
                    </button>
                </div>
            </div>

            <div class="lang-selector">
                <button class="lang-btn active" data-lang="ar">🇸🇦 عربي</button>
                <button class="lang-btn" data-lang="en">🇬🇧 English</button>
            </div>
        </div>

    </div>

    <script>
        // ================================================================
        //  🧠  Zeki Chat - شغال مع Groq API (نماذج مدعومة)
        //  🔑 المفتاح مضمّن - ما يطلب منك شيء
        // ================================================================

        // ---- Elements ----
        const chatArea = document.getElementById('chatArea');
        const welcomeMsg = document.getElementById('welcomeMsg');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const clearBtn = document.getElementById('clearBtn');
        const typingIndicator = document.getElementById('typingIndicator');
        const langBtns = document.querySelectorAll('.lang-btn');

        // ---- Groq API Settings (نماذج مدعومة حالياً) ----
        const API_KEY = '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';
        const API_URL = 'https://api.groq.com/openai/v1/chat/completions';
        
        // ✅ النماذج المدعومة حالياً (اختار واحد):
        // 1. 'llama-3.3-70b-versatile' - الأقوى (70B)
        // 2. 'llama-3.1-8b-instant' - الأسرع (8B)
        const MODEL = 'llama-3.3-70b-versatile'; 

        let isProcessing = false;
        let currentLang = 'ar';

        // ---- Add Message ----
        function addMessage(type, content) {
            if (welcomeMsg) welcomeMsg.style.display = 'none';

            const messageDiv = document.createElement('div');
            messageDiv.className = 'message';

            const avatar = document.createElement('div');
            avatar.className = `message-avatar ${type}`;
            avatar.textContent = type === 'user' ? '👤' : '🧠';

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.innerHTML = content;

            messageDiv.appendChild(avatar);
            messageDiv.appendChild(contentDiv);
            chatArea.appendChild(messageDiv);

            chatArea.scrollTop = chatArea.scrollHeight;
        }

        // ---- Clear Chat ----
        function clearChat() {
            const messages = chatArea.querySelectorAll('.message');
            messages.forEach(msg => msg.remove());
            if (welcomeMsg) welcomeMsg.style.display = 'flex';
        }

        // ---- Call Groq API ----
        async function callGroqAPI(text, lang) {
            const systemPrompt = lang === 'ar' ?
                'أنت مساعد ذكي اسمك زكي. دائماً ترد باللغة العربية الفصحى.' :
                'You are a smart assistant named Zeki. Always respond in English.';

            const payload = {
                model: MODEL,
                messages: [
                    { role: 'system', content: systemPrompt },
                    { role: 'user', content: text }
                ],
                max_tokens: 800,
                temperature: 0.7,
                stream: false
            };

            const response = await fetch(API_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${API_KEY}`
                },
                body: JSON.stringify(payload)
            });

            if (!response.ok) {
                const errorData = await response.json().catch(() => ({}));
                let errMsg = `Error ${response.status}`;
                if (errorData.error?.message) {
                    errMsg = errorData.error.message;
                }
                throw new Error(errMsg);
            }

            const data = await response.json();
            const textResponse = data?.choices?.[0]?.message?.content;

            if (!textResponse) {
                throw new Error('No response generated.');
            }

            return textResponse;
        }

        // ---- Send Message ----
        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) {
                userInput.style.borderColor = '#f87171';
                setTimeout(() => {
                    userInput.style.borderColor = 'transparent';
                }, 800);
                return;
            }

            if (isProcessing) return;

            addMessage('user', text);
            userInput.value = '';
            userInput.focus();
            userInput.style.borderColor = 'transparent';

            isProcessing = true;
            sendBtn.disabled = true;
            typingIndicator.classList.add('active');

            try {
                const response = await callGroqAPI(text, currentLang);
                addMessage('bot', response);
            } catch (error) {
                console.error('❌ Error:', error);
                let errorMsg = '❌ عذراً، حدث خطأ.';
                if (error.message.includes('rate') || error.message.includes('limit')) {
                    errorMsg = '⚠️ تجاوزت حد الطلبات (30/دقيقة). انتظر دقيقة وحاول مرة أخرى.';
                } else if (error.message.includes('API key') || error.message.includes('Invalid')) {
                    errorMsg = '❌ مفتاح API غير صالح. يرجى التحقق منه.';
                } else {
                    errorMsg = `❌ ${error.message}`;
                }
                addMessage('bot', errorMsg);
            } finally {
                isProcessing = false;
                sendBtn.disabled = false;
                typingIndicator.classList.remove('active');
            }
        }

        // ---- Language Selector ----
        langBtns.forEach(btn => {
            btn.addEventListener('click', function() {
                langBtns.forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentLang = this.dataset.lang;
                userInput.placeholder = currentLang === 'ar' ?
                    'اكتب رسالتك...' :
                    'Type your message...';
                if (welcomeMsg.style.display !== 'none') {
                    const h2 = welcomeMsg.querySelector('h2');
                    const p = welcomeMsg.querySelector('p');
                    if (currentLang === 'ar') {
                        h2.textContent = 'مرحباً بك في ذكي شات';
                        p.textContent = 'اسألني أي شيء وسأجيبك بالعربية 🚀';
                    } else {
                        h2.textContent = 'Welcome to Zeki Chat';
                        p.textContent = "Ask me anything and I'll answer in English 🚀";
                    }
                }
            });
        });

        // ---- Events ----
        function init() {
            sendBtn.addEventListener('click', function(e) {
                e.preventDefault();
                sendMessage();
            });

            userInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });

            clearBtn.addEventListener('click', function(e) {
                e.preventDefault();
                clearChat();
                const confirmMsg = document.createElement('div');
                confirmMsg.className = 'message';
                confirmMsg.innerHTML = `
                    <div class="message-avatar bot">🧠</div>
                    <div class="message-content" style="color:#6e6f82;font-style:italic;">
                        ${currentLang === 'ar' ? 'تم مسح المحادثة ✨' : 'Chat cleared ✨'}
                    </div>
                `;
                chatArea.appendChild(confirmMsg);
                chatArea.scrollTop = chatArea.scrollHeight;
                setTimeout(() => {
                    if (confirmMsg.parentNode) {
                        confirmMsg.remove();
                        if (chatArea.querySelectorAll('.message').length === 0) {
                            if (welcomeMsg) welcomeMsg.style.display = 'flex';
                        }
                    }
                }, 2000);
            });

            userInput.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 160) + 'px';
            });

            userInput.focus();

            console.log('✅ Zeki Chat ready with Groq!');
            console.log('📌 Model:', MODEL);
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>

</body>
</html>
