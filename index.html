<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zaki Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #0a0a0f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 12px;
        }

        .container {
            background: #14141c;
            border-radius: 28px;
            max-width: 900px;
            width: 100%;
            height: 95vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.05);
            overflow: hidden;
        }

        .header {
            background: rgba(20, 20, 28, 0.95);
            backdrop-filter: blur(20px);
            padding: 14px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            background: linear-gradient(135deg, #4facfe, #3b82f6);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(79, 172, 254, 0.15);
        }

        .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .header-title {
            color: #fff;
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-status {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #6e6f82;
            font-size: 12px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #10a37f;
            border-radius: 50%;
            display: inline-block;
            animation: pulse-dot 2s infinite;
            box-shadow: 0 0 12px rgba(16, 163, 127, 0.4);
        }

        @keyframes pulse-dot {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.4;
                transform: scale(0.8);
            }
        }

        .lang-toggle {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #e5e7eb;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .lang-toggle:hover {
            background: rgba(79, 172, 254, 0.15);
            border-color: rgba(79, 172, 254, 0.3);
        }

        .lang-toggle .icon {
            font-size: 16px;
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
            background: #0f0f17;
            scroll-behavior: smooth;
        }

        .chat-area::-webkit-scrollbar {
            width: 4px;
        }

        .chat-area::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-area::-webkit-scrollbar-thumb {
            background: #2a2a3a;
            border-radius: 10px;
        }

        .message {
            display: flex;
            gap: 12px;
            padding: 12px 0;
            animation: fadeSlide 0.3s ease;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(14px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 17px;
            flex-shrink: 0;
        }

        .message-avatar.user {
            background: linear-gradient(135deg, #10a37f, #0d8a6a);
        }

        .message-avatar.bot {
            background: linear-gradient(135deg, #4facfe, #3b82f6);
            box-shadow: 0 0 20px rgba(79, 172, 254, 0.2);
        }

        .message-content {
            flex: 1;
            color: #e5e7eb;
            font-size: 15px;
            line-height: 1.7;
            word-wrap: break-word;
        }

        .message-content .text {
            background: rgba(255, 255, 255, 0.04);
            padding: 10px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        .message.user .message-content .text {
            background: linear-gradient(135deg, rgba(16, 163, 127, 0.15), rgba(16, 163, 127, 0.05));
            border-color: rgba(16, 163, 127, 0.1);
        }

        .image-container {
            margin-top: 8px;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.06);
            background: rgba(255, 255, 255, 0.03);
            position: relative;
        }

        .image-container img {
            width: 100%;
            max-height: 420px;
            object-fit: contain;
            display: block;
        }

        .image-source {
            color: #4facfe;
            font-size: 11px;
            padding: 4px 12px;
            background: rgba(79, 172, 254, 0.1);
            border-bottom: 1px solid rgba(79, 172, 254, 0.1);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .image-actions {
            display: flex;
            gap: 8px;
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            flex-wrap: wrap;
        }

        .image-actions .btn-download {
            background: rgba(79, 172, 254, 0.2);
            border: 1px solid rgba(79, 172, 254, 0.2);
            color: #4facfe;
            padding: 4px 14px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .image-actions .btn-download:hover {
            background: rgba(79, 172, 254, 0.3);
        }

        .image-prompt {
            color: #6e6f82;
            font-size: 12px;
            padding: 6px 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            background: rgba(255, 255, 255, 0.02);
        }

        .message-actions {
            display: flex;
            gap: 6px;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .btn-action {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: #8e8ea0;
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .btn-action:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #e5e7eb;
        }

        .btn-action:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .welcome-msg {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            min-height: 260px;
            color: #6e6f82;
            text-align: center;
            padding: 20px;
        }

        .welcome-msg .big-icon {
            font-size: 64px;
            margin-bottom: 12px;
            filter: drop-shadow(0 0 30px rgba(79, 172, 254, 0.1));
        }

        .welcome-msg h2 {
            color: #e5e7eb;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .welcome-msg p {
            font-size: 14px;
            color: #6e6f82;
            max-width: 350px;
        }

        .typing-indicator {
            display: none;
            padding: 10px 0;
            gap: 12px;
            align-items: center;
            margin: 0 20px;
        }

        .typing-indicator.active {
            display: flex;
        }

        .typing-indicator .avatar {
            width: 34px;
            height: 34px;
            border-radius: 10px;
            background: linear-gradient(135deg, #4facfe, #3b82f6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
            box-shadow: 0 0 20px rgba(79, 172, 254, 0.15);
        }

        .typing-dots {
            display: flex;
            gap: 5px;
            padding: 6px 0;
        }

        .typing-dots span {
            width: 8px;
            height: 8px;
            background: #4a4a5a;
            border-radius: 50%;
            animation: typingBounce 1.3s infinite both;
        }

        .typing-dots span:nth-child(1) {
            animation-delay: 0s;
        }
        .typing-dots span:nth-child(2) {
            animation-delay: 0.2s;
        }
        .typing-dots span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typingBounce {
            0%,
            60%,
            100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-8px);
            }
        }

        .input-area {
            background: rgba(15, 15, 23, 0.95);
            backdrop-filter: blur(20px);
            padding: 12px 20px 18px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            flex-shrink: 0;
        }

        .input-wrapper {
            display: flex;
            gap: 8px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 16px;
            padding: 4px 6px 4px 16px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.3s ease;
        }

        .input-wrapper:focus-within {
            border-color: rgba(79, 172, 254, 0.3);
            box-shadow: 0 0 30px rgba(79, 172, 254, 0.05);
            background: rgba(255, 255, 255, 0.06);
        }

        #userInput {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #e5e7eb;
            font-size: 15px;
            padding: 10px 4px;
            resize: none;
            min-height: 24px;
            max-height: 160px;
        }

        #userInput::placeholder {
            color: #4a4a5a;
        }

        .btn-group {
            display: flex;
            gap: 2px;
            align-items: center;
        }

        .btn-icon {
            background: transparent;
            border: none;
            color: #4a4a5a;
            font-size: 20px;
            cursor: pointer;
            padding: 8px 10px;
            border-radius: 12px;
            transition: all 0.2s;
            position: relative;
        }

        .btn-icon:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.06);
            color: #e5e7eb;
        }

        .btn-icon:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .btn-send {
            background: linear-gradient(135deg, #4facfe, #3b82f6);
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 10px 22px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 4px 20px rgba(79, 172, 254, 0.2);
        }

        .btn-send:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(79, 172, 254, 0.3);
        }

        .btn-send:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        /* تنسيق خاص للغة الإنجليزية */
        body[dir="ltr"] .container {
            direction: ltr;
        }

        body[dir="ltr"] .header-title {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        body[dir="ltr"] .message.user .message-content .text {
            background: linear-gradient(135deg, rgba(16, 163, 127, 0.15), rgba(16, 163, 127, 0.05));
            border-color: rgba(16, 163, 127, 0.1);
        }

        @media (max-width: 640px) {
            body {
                padding: 0;
            }
            .container {
                height: 100vh;
                border-radius: 0;
                border: none;
            }
            .header {
                padding: 10px 16px;
                flex-wrap: wrap;
                gap: 6px;
            }
            .header-title {
                font-size: 18px;
            }
            .header-actions {
                gap: 6px;
            }
            .lang-toggle {
                font-size: 11px;
                padding: 4px 10px;
            }
            .chat-area {
                padding: 10px 14px;
            }
            .message {
                gap: 10px;
                padding: 10px 0;
            }
            .message-avatar {
                width: 30px;
                height: 30px;
                font-size: 14px;
            }
            .message-content {
                font-size: 14px;
            }
            .message-content .text {
                padding: 8px 12px;
            }
            .input-area {
                padding: 10px 14px 14px;
            }
            .input-wrapper {
                padding: 4px 4px 4px 12px;
            }
            #userInput {
                font-size: 14px;
                padding: 8px 2px;
            }
            .btn-send {
                padding: 8px 16px;
                font-size: 13px;
            }
            .btn-icon {
                font-size: 18px;
                padding: 6px 8px;
            }
            .welcome-msg .big-icon {
                font-size: 44px;
            }
            .welcome-msg h2 {
                font-size: 20px;
            }
            .image-container img {
                max-height: 280px;
            }
            .image-actions {
                gap: 4px;
                padding: 6px 10px;
            }
            .image-actions .btn-download {
                font-size: 11px;
                padding: 3px 10px;
            }
        }

        @media (max-width: 400px) {
            .btn-send span:first-child {
                display: none;
            }
            .header-status span:last-child {
                display: none;
            }
            .logo-icon {
                width: 34px;
                height: 34px;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <div class="header">
            <div class="header-left">
                <div class="logo-icon">
                    <img src="https://i.ibb.co/cKvNqYvq/logo.png" alt="Zaki Logo" />
                </div>
                <span class="header-title">Zaki Chat</span>
            </div>
            <div class="header-actions">
                <div class="header-status">
                    <span class="status-dot"></span>
                    <span id="statusText">جاهز</span>
                </div>
                <button class="lang-toggle" id="langToggle" title="تبديل اللغة">
                    <span class="icon">🌐</span>
                    <span id="langLabel">🇸🇦 عربي</span>
                </button>
            </div>
        </div>

        <div class="chat-area" id="chatArea">
            <div class="welcome-msg" id="welcomeMsg">
                <span class="big-icon">🧠</span>
                <h2 id="welcomeTitle">مرحباً في زكي شات</h2>
                <p id="welcomeDesc">توليد الصور والمحادثات باستخدام الذكاء الاصطناعي</p>
            </div>
        </div>

        <div class="typing-indicator" id="typingIndicator">
            <div class="avatar">🧠</div>
            <div class="typing-dots">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="userInput" placeholder="اكتب الرسالة..." />
                <div class="btn-group">
                    <button class="btn-icon" id="imageBtn" title="توليد صورة">🖼️</button>
                    <button class="btn-icon" id="clearBtn" title="مسح المحادثة">🗑️</button>
                    <button class="btn-send" id="sendBtn">
                        <span>إرسال</span>
                        <span>➤</span>
                    </button>
                </div>
            </div>
        </div>

    </div>

    <script>
        // ================================================================
        //  🧠  زكي شات - Groq للمحادثة + Pinterest + Agnes للصور
        //  مع زر تبديل اللغة (عربي / إنجليزي)
        // ================================================================

        // ---- العناصر ----
        const chatArea = document.getElementById('chatArea');
        const welcomeMsg = document.getElementById('welcomeMsg');
        const welcomeTitle = document.getElementById('welcomeTitle');
        const welcomeDesc = document.getElementById('welcomeDesc');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const imageBtn = document.getElementById('imageBtn');
        const clearBtn = document.getElementById('clearBtn');
        const typingIndicator = document.getElementById('typingIndicator');
        const langToggle = document.getElementById('langToggle');
        const langLabel = document.getElementById('langLabel');
        const statusText = document.getElementById('statusText');

        // ---- حالة اللغة ----
        let currentLang = 'ar'; // 'ar' أو 'en'

        // ---- النصوص متعددة اللغات ----
        const LANG = {
            ar: {
                status: 'جاهز',
                placeholder: 'اكتب الرسالة...',
                send: 'إرسال',
                welcomeTitle: 'مرحباً في زكي شات',
                welcomeDesc: 'توليد الصور والمحادثات باستخدام الذكاء الاصطناعي',
                langLabel: '🇸🇦 عربي',
                clearMsg: '✨ تم مسح المحادثة',
                error: '❌ عذراً، حدث خطأ.',
                rateLimit: '⚠️ تجاوزت حد الطلبات. انتظر دقيقة وحاول مرة أخرى.',
                apiKeyError: '❌ مشكلة في المفتاح. حاول مرة أخرى.',
                imagePrompt: '📝 اكتب وصف الصورة:',
                pinterestFound: '🔍 وجدت هذه الصورة على Pinterest',
                agnesGenerated: '💡 لم أجدها على Pinterest، قمت بتوليدها لك',
                agnesError: '⚠️ حدث خطأ في التوليد، لكن وجدت هذه الصورة كبديل',
                download: '⬇️ تحميل الصورة',
                open: '🔗 فتح في تبويب جديد',
                copy: '📋 نسخ',
                copied: '✅ تم!',
                imageAlt: 'صورة',
                sourcePinterest: 'Pinterest',
                sourceAgnes: 'Agnes AI (تم التوليد)',
                sourceFallback: 'Pinterest (بديل)',
            },
            en: {
                status: 'Ready',
                placeholder: 'Type a message...',
                send: 'Send',
                welcomeTitle: 'Welcome to Zaki Chat',
                welcomeDesc: 'Generating images and conversations using AI',
                langLabel: '🇬🇧 English',
                clearMsg: '✨ Chat cleared',
                error: '❌ Sorry, an error occurred.',
                rateLimit: '⚠️ Rate limit exceeded. Wait a moment and try again.',
                apiKeyError: '❌ API key issue. Please try again.',
                imagePrompt: '📝 Describe the image:',
                pinterestFound: '🔍 Found this image on Pinterest',
                agnesGenerated: '💡 Not found on Pinterest, generated for you',
                agnesError: '⚠️ Generation error, but found this alternative image',
                download: '⬇️ Download',
                open: '🔗 Open in new tab',
                copy: '📋 Copy',
                copied: '✅ Done!',
                imageAlt: 'Image',
                sourcePinterest: 'Pinterest',
                sourceAgnes: 'Agnes AI (Generated)',
                sourceFallback: 'Pinterest (Fallback)',
            }
        };

        // ---- مفاتيح API ----
        const GROQ_API_KEY = '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';
        const GROQ_API_URL = 'https://api.groq.com/openai/v1/chat/completions';
        const GROQ_MODEL = 'llama-3.3-70b-versatile';

        const AGNES_API_KEY = 'sk-oP60rzoFwCu5HkTpdLjDXX8IjNKgJP9Xu38i00cvkbo1W9US';
        const AGNES_IMAGE_URL = 'https://apihub.agnes-ai.com/v1/images/generations';

        let isProcessing = false;

        // ---- تحديث الواجهة حسب اللغة ----
        function updateLanguage(lang) {
            const t = LANG[lang];
            document.documentElement.lang = lang;
            document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
            document.body.dir = lang === 'ar' ? 'rtl' : 'ltr';
            document.body.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');

            statusText.textContent = t.status;
            userInput.placeholder = t.placeholder;
            sendBtn.querySelector('span:first-child').textContent = t.send;
            welcomeTitle.textContent = t.welcomeTitle;
            welcomeDesc.textContent = t.welcomeDesc;
            langLabel.textContent = t.langLabel;

            // تحديث كل الرسائل الموجودة (النصوص الثابتة)
            document.querySelectorAll('.message .text').forEach(el => {
                // نترك المحتوى الديناميكي كما هو، فقط نغير النصوص الثابتة إذا وجدت
            });

            // تحديث نصوص الأزرار في الصور إذا كانت موجودة
            document.querySelectorAll('.image-actions .btn-download').forEach((btn, index) => {
                if (index % 2 === 0) btn.innerHTML = `⬇️ ${t.download}`;
                else btn.innerHTML = `🔗 ${t.open}`;
            });

            // تحديث رسالة الترحيب الثابتة
            const welcomeMsgEl = document.getElementById('welcomeMsg');
            if (welcomeMsgEl) {
                const title = welcomeMsgEl.querySelector('h2');
                const desc = welcomeMsgEl.querySelector('p');
                if (title) title.textContent = t.welcomeTitle;
                if (desc) desc.textContent = t.welcomeDesc;
            }
        }

        // ---- تبديل اللغة ----
        function toggleLanguage() {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            updateLanguage(currentLang);
        }

        // ---- البحث في Pinterest ----
        async function searchPinterest(query) {
            try {
                const url =
                `https://pinterest-scraper-api.vercel.app/search?q=${encodeURIComponent(query)}&limit=5`;
                const response = await fetch(url);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                if (data.results && data.results.length > 0) {
                    return {
                        found: true,
                        imageUrl: data.results[0].images?.orig || data.results[0].imageUrl,
                        source: 'Pinterest',
                        title: data.results[0].title || 'Image from Pinterest'
                    };
                }
                return { found: false };
            } catch (error) {
                console.error('Pinterest error:', error);
                return { found: false, error: error.message };
            }
        }

        // ---- توليد الصور باستخدام Agnes AI ----
        async function generateImage(prompt) {
            try {
                const response = await fetch(AGNES_IMAGE_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${AGNES_API_KEY}`
                    },
                    body: JSON.stringify({
                        model: 'agnes-image-2.1-flash',
                        prompt: prompt,
                        size: '1024x1024'
                    })
                });
                if (!response.ok) {
                    const error = await response.json().catch(() => ({}));
                    throw new Error(error.error?.message || `HTTP ${response.status}`);
                }
                const data = await response.json();
                const imageUrl = data?.data?.[0]?.url;
                if (!imageUrl) throw new Error('No image URL in response');
                return {
                    found: true,
                    imageUrl: imageUrl,
                    source: 'Agnes AI',
                    title: 'Generated by AI'
                };
            } catch (error) {
                console.error('Agnes error:', error);
                throw error;
            }
        }

        // ---- عرض الرسائل ----
        function addMessage(type, content, isImage = false, imageData = null) {
            if (welcomeMsg) welcomeMsg.style.display = 'none';

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;

            const avatar = document.createElement('div');
            avatar.className = `message-avatar ${type}`;
            avatar.textContent = type === 'user' ? '👤' : '🧠';

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';

            const t = LANG[currentLang];

            if (isImage && imageData) {
                const container = document.createElement('div');
                container.className = 'image-container';

                const sourceDiv = document.createElement('div');
                sourceDiv.className = 'image-source';
                let sourceLabel = imageData.source;
                if (sourceLabel === 'Pinterest') sourceLabel = t.sourcePinterest;
                else if (sourceLabel === 'Agnes AI') sourceLabel = t.sourceAgnes;
                else if (sourceLabel === 'Pinterest (بديل)') sourceLabel = t.sourceFallback;
                const sourceIcon = imageData.source.includes('Pinterest') ? '📌' : '🧠';
                sourceDiv.innerHTML = `${sourceIcon} ${t.sourcePinterest === sourceLabel ? '📌' : '🧠'} ${t.sourcePinterest === sourceLabel ? t.sourcePinterest : t.sourceAgnes}`;
                container.appendChild(sourceDiv);

                const img = document.createElement('img');
                img.src = imageData.imageUrl;
                img.alt = t.imageAlt;
                img.loading = 'lazy';
                img.style.opacity = '0';
                img.onload = () => { img.style.opacity = '1'; };
                img.onerror = () => {
                    container.innerHTML = `
                        <div style="padding:30px;text-align:center;color:#6e6f82;">
                            ❌ ${t.error}
                        </div>
                    `;
                };
                container.appendChild(img);

                const actionsDiv = document.createElement('div');
                actionsDiv.className = 'image-actions';

                const downloadBtn = document.createElement('button');
                downloadBtn.className = 'btn-download';
                downloadBtn.innerHTML = `⬇️ ${t.download}`;
                downloadBtn.onclick = () => {
                    const link = document.createElement('a');
                    link.href = imageData.imageUrl;
                    link.download = `zeki_image_${Date.now()}.jpg`;
                    link.target = '_blank';
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                };

                const openBtn = document.createElement('button');
                openBtn.className = 'btn-download';
                openBtn.innerHTML = `🔗 ${t.open}`;
                openBtn.onclick = () => {
                    window.open(imageData.imageUrl, '_blank');
                };

                actionsDiv.appendChild(downloadBtn);
                actionsDiv.appendChild(openBtn);
                container.appendChild(actionsDiv);

                const promptText = document.createElement('div');
                promptText.className = 'image-prompt';
                promptText.textContent = `🖼️ ${imageData.title || t.imageAlt}`;

                contentDiv.appendChild(container);
                contentDiv.appendChild(promptText);

            } else {
                const textDiv = document.createElement('div');
                textDiv.className = 'text';
                textDiv.innerHTML = content;
                contentDiv.appendChild(textDiv);

                if (type === 'bot') {
                    const actions = document.createElement('div');
                    actions.className = 'message-actions';

                    const copyBtn = document.createElement('button');
                    copyBtn.className = 'btn-action';
                    copyBtn.innerHTML = t.copy;
                    copyBtn.onclick = () => {
                        const txt = textDiv.textContent || textDiv.innerText;
                        navigator.clipboard?.writeText(txt);
                        copyBtn.innerHTML = t.copied;
                        setTimeout(() => copyBtn.innerHTML = t.copy, 2000);
                    };

                    actions.appendChild(copyBtn);
                    contentDiv.appendChild(actions);
                }
            }

            messageDiv.appendChild(avatar);
            messageDiv.appendChild(contentDiv);
            chatArea.appendChild(messageDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function clearChat() {
            document.querySelectorAll('.message').forEach(el => el.remove());
            if (welcomeMsg) welcomeMsg.style.display = 'flex';
        }

        // ---- الاتصال بـ Groq ----
        async function callGroq(prompt) {
            const systemPrompt = currentLang === 'ar' ?
                'أنت مساعد ذكي اسمك "زكي". ترد دائماً باللغة العربية الفصحى. ساعد المستخدم في أي سؤال.' :
                'You are a smart assistant named "Zaki". Always respond in English. Help the user with any question.';

            const res = await fetch(GROQ_API_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${GROQ_API_KEY}`
                },
                body: JSON.stringify({
                    model: GROQ_MODEL,
                    messages: [
                        { role: 'system', content: systemPrompt },
                        { role: 'user', content: prompt }
                    ],
                    max_tokens: 800,
                    temperature: 0.7
                })
            });

            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                throw new Error(err.error?.message || `HTTP ${res.status}`);
            }

            const data = await res.json();
            const reply = data?.choices?.[0]?.message?.content;
            if (!reply) throw new Error('No reply generated');
            return reply;
        }

        // ---- إرسال الرسالة ----
        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) {
                userInput.style.borderColor = '#f87171';
                setTimeout(() => userInput.style.borderColor = 'transparent', 800);
                return;
            }
            if (isProcessing) return;

            const t = LANG[currentLang];
            const isImageRequest = /صوره|صورة|ارسم|رسم|توليد|انشاء|image|picture|draw|generate|create/i.test(text);

            addMessage('user', text);
            userInput.value = '';
            userInput.focus();
            userInput.style.borderColor = 'transparent';

            isProcessing = true;
            sendBtn.disabled = true;
            imageBtn.disabled = true;
            typingIndicator.classList.add('active');

            try {
                if (isImageRequest) {
                    const pinterestResult = await searchPinterest(text);
                    if (pinterestResult.found) {
                        addMessage('bot', t.pinterestFound, true, {
                            imageUrl: pinterestResult.imageUrl,
                            source: 'Pinterest',
                            title: pinterestResult.title || 'Image from Pinterest'
                        });
                    } else {
                        const agnesResult = await generateImage(text);
                        addMessage('bot', t.agnesGenerated, true, {
                            imageUrl: agnesResult.imageUrl,
                            source: 'Agnes AI',
                            title: text
                        });
                    }
                } else {
                    const reply = await callGroq(text);
                    addMessage('bot', reply);
                }
            } catch (err) {
                console.error('Error:', err);
                let msg = t.error;
                if (err.message.includes('rate')) msg = t.rateLimit;
                else if (err.message.includes('API key')) msg = t.apiKeyError;
                else msg = `❌ ${err.message}`;

                if (isImageRequest) {
                    try {
                        const fallback = await searchPinterest('nature');
                        if (fallback.found) {
                            addMessage('bot', t.agnesError, true, {
                                imageUrl: fallback.imageUrl,
                                source: 'Pinterest (بديل)',
                                title: 'Alternative image'
                            });
                            return;
                        }
                    } catch (e) { /* ignore */ }
                }
                addMessage('bot', msg);
            } finally {
                isProcessing = false;
                sendBtn.disabled = false;
                imageBtn.disabled = false;
                typingIndicator.classList.remove('active');
            }
        }

        // ---- الأحداث ----
        function init() {
            // اللغة الافتراضية
            updateLanguage('ar');

            langToggle.addEventListener('click', (e) => {
                e.preventDefault();
                toggleLanguage();
            });

            sendBtn.addEventListener('click', (e) => {
                e.preventDefault();
                sendMessage();
            });

            userInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });

            imageBtn.addEventListener('click', (e) => {
                e.preventDefault();
                if (isProcessing) return;
                const t = LANG[currentLang];
                const prompt = prompt(t.imagePrompt);
                if (prompt?.trim()) {
                    userInput.value = prompt.trim();
                    sendMessage();
                }
            });

            clearBtn.addEventListener('click', (e) => {
                e.preventDefault();
                clearChat();
                const t = LANG[currentLang];
                const msg = document.createElement('div');
                msg.className = 'message bot';
                msg.innerHTML = `
                    <div class="message-avatar bot">🧠</div>
                    <div class="message-content">
                        <div class="text" style="color:#6e6f82;font-style:italic;">
                            ${t.clearMsg}
                        </div>
                    </div>
                `;
                chatArea.appendChild(msg);
                chatArea.scrollTop = chatArea.scrollHeight;
                setTimeout(() => {
                    msg.remove();
                    if (!chatArea.querySelector('.message')) welcomeMsg.style.display = 'flex';
                }, 2000);
            });

            userInput.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 160) + 'px';
            });

            userInput.focus();

            console.log('✅ Zaki Chat ready!');
            console.log('🧠 Conversation: Groq API');
            console.log('🔍 Search: Pinterest (free)');
            console.log('🖼️ Generation: Agnes AI (free)');
            console.log('🌐 Language toggle: Arabic / English');
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
